<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sign Up</title>

  <!-- Supabase JS v2 as module -->
  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    // ✅ Replace with your actual Supabase URL and ANON KEY
    const SUPABASE_URL = "https://gocoupvzzsgouwdkdmzu.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdvY291cHZ6enNnb3V3ZGtkbXp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAwMDc2MTAsImV4cCI6MjA4NTU4MzYxMH0.XGxBzWLg9etqOo9NVAX5mrli2u-0dwEYGsVgwx4tXaw";

    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    // Make signup function global so onclick works
    window.signup = async function() {
      const full_name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const errorBox = document.getElementById("error");

      errorBox.innerText = "";

      if (!full_name || !email || !password) {
        errorBox.innerText = "All fields are required";
        return;
      }

      try {
        // ✅ Create Auth user
        const { data, error } = await supabase.auth.signUp({
          email,
          password,
          options: {
            data: {
              full_name,
              role: "student" // 🔒 Default role for public signup
            }
          }
        });

        if (error) {
          errorBox.innerText = error.message;
          return;
        }

        alert("Signup successful! Please login.");
        window.location.href = "login.html";

      } catch (err) {
        console.error(err);
        errorBox.innerText = "Something went wrong. Try again.";
      }
    };
  </script>

  <link rel="stylesheet" href="signup.css" />
</head>
<body>

  <div class="auth-box">
    <h2>Create Account</h2>

    <input type="text" id="name" placeholder="Full Name" />
    <input type="email" id="email" placeholder="Email" />
    <input type="password" id="password" placeholder="Password" />

    <button onclick="signup()">Sign Up</button>

    <p id="error" class="error"></p>

    <p>
      Already have an account?
      <a href="login.html">Login</a>
    </p>
  </div>

</body>
</html>
