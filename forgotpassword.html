<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password</title>
  <link rel="stylesheet" href="login.css">
</head>
<body>
  <div class="login-container">
    <h2>Forgot Password</h2>
    <p>Enter your email to reset your password:</p>
    <input type="email" id="forgotEmail" placeholder="Enter your email" required />
    <button id="sendResetBtn">Send Reset Link</button>
    <p id="error"></p>
  </div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    const SUPABASE_URL = "https://gocoupvzzsgouwdkdmzu.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdvY291cHZ6enNnb3V3ZGtkbXp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAwMDc2MTAsImV4cCI6MjA4NTU4MzYxMH0.XGxBzWLg9etqOo9NVAX5mrli2u-0dwEYGsVgwx4tXaw"; // same as login.js
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const emailInput = document.getElementById('forgotEmail');
    const sendBtn = document.getElementById('sendResetBtn');
    const errorMsg = document.getElementById('error');

    sendBtn.addEventListener('click', async () => {
      const email = emailInput.value.trim();
      if (!email) {
        errorMsg.style.color = "red";
        errorMsg.textContent = "Please enter your email!";
        return;
      }

      const { data, error } = await supabase.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + '/login.html'
      });

      if (error) {
        errorMsg.style.color = "red";
        errorMsg.textContent = error.message;
      } else {
        errorMsg.style.color = "green";
        errorMsg.textContent = "Password reset email sent! Check your inbox.";
      }
    });
  </script>
</body>
</html>
