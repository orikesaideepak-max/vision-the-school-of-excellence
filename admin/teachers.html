<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vision School – Teachers Master</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Poppins;background:#f4f6fb;}
header{background:linear-gradient(135deg,#1e2a78,#283593);color:white;padding:18px 25px;font-size:20px;font-weight:600;text-align:center;}
.container{padding:25px;}
.top-bar{display:flex;justify-content:space-between;margin-bottom:15px;}
.search-bar{display:flex;gap:10px;}
.search-bar input{padding:9px 12px;border-radius:6px;border:1px solid #ccc;}
button{padding:7px 12px;border:none;border-radius:6px;cursor:pointer;font-size:12px;}
.edit{background:#5c6bc0;color:white;}
.view{background:#3498db;color:white;}
.export{background:#16a085;color:white;}
.table-wrapper{background:white;border-radius:10px;overflow:auto;box-shadow:0 10px 25px rgba(0,0,0,.08);}
table{width:100%;border-collapse:collapse;font-size:13px;}
th,td{padding:12px;border-bottom:1px solid #eee;}
th{background:#eef1ff;}
tr:hover{background:#f9fbff;}
.status-active{background:#e6f9ed;color:#0f9d58;padding:4px 10px;border-radius:6px;font-size:12px;}
.status-inactive{background:#fce4ec;color:#c2185b;padding:4px 10px;border-radius:6px;font-size:12px;}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);}
.modal-box{background:white;width:500px;margin:60px auto;padding:20px;border-radius:10px;}
.field{width:100%;padding:9px;margin-bottom:10px;border-radius:6px;border:1px solid #ccc;}
.modal-actions{display:flex;justify-content:flex-end;gap:10px;}
.preview{width:80px;height:80px;border-radius:50%;object-fit:cover;margin-bottom:10px;}
.count-box{margin-bottom:10px;font-size:14px;font-weight:500;}
</style>
</head>
<body>

<header>🏫 Vision School – Teachers Master</header>

<div class="container">

<div class="count-box">Total Teachers: <span id="teacher-count">0</span></div>

<div class="top-bar">
  <div class="search-bar">
    <input id="searchName" placeholder="Search Name">
    <input id="searchEmail" placeholder="Search Email">
  </div>
  <button class="export" onclick="exportTeachers()">Export Teachers</button>
</div>

<div class="table-wrapper">
<table>
  <thead>
    <tr>
      <th>Photo</th>
      <th>Name</th>
      <th>Email</th>
      <th>Mobile</th>
      <th>Subject</th>
      <th>Status</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody id="teachersBody"></tbody>
</table>
</div>

</div>

<!-- EDIT MODAL -->
<div class="modal" id="editModal">
  <div class="modal-box">
    <h3>Edit Teacher</h3>
    <input type="hidden" id="teacherId">
    <img id="photoPreview" class="preview">
    <input id="photo_url" class="field" placeholder="Photo URL">
    <input id="name" class="field" placeholder="Name">
    <input id="email" class="field" placeholder="Email">
    <input id="mobile" class="field" placeholder="Mobile">
    <input id="subject" class="field" placeholder="Subject">
    <select id="status" class="field">
      <option value="active">Active</option>
      <option value="inactive">Inactive</option>
    </select>
    <div class="modal-actions">
      <button onclick="closeModal()">Cancel</button>
      <button class="edit" onclick="saveTeacher()">Save</button>
    </div>
  </div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://gocoupvzzsgouwdkdmzu.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdvY291cHZ6enNnb3V3ZGtkbXp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAwMDc2MTAsImV4cCI6MjA4NTU4MzYxMH0.XGxBzWLg9etqOo9NVAX5mrli2u-0dwEYGsVgwx4tXaw"
)

const teachersBody = document.getElementById("teachersBody")
let teachersCache = []

// Fetch teachers like your users logic
async function fetchTeachers(){
  const { data:users, error } = await supabase
    .from("profiles")
    .select("user_id,full_name,email,role,teachers(*)") // optional join if you store teacher details separately
    .eq("role","teacher")

  if(error){
    alert(error.message)
    return
  }

  teachersCache = users || []
  document.getElementById("teacher-count").innerText = teachersCache.length
  renderTable(teachersCache)
}

function renderTable(data){
  teachersBody.innerHTML = ""
  data.forEach(u=>{
    const t = u.teachers?.[0] || {}
    const statusClass = t.status==="inactive"?"status-inactive":"status-active"
    const statusText = t.status==="inactive"?"Inactive":"Active"

    teachersBody.innerHTML += `
      <tr>
        <td><img src="${t.photo_url||'https://cdn-icons-png.flaticon.com/512/3135/3135715.png'}" width="35" style="border-radius:50%"></td>
        <td>${u.full_name}</td>
        <td>${u.email}</td>
        <td>${t.mobile||"-"}</td>
        <td>${t.subject||"-"}</td>
        <td><span class="${statusClass}">${statusText}</span></td>
        <td>
          <button class="edit" onclick="editTeacher('${u.user_id}')">Edit</button>
          <button class="view" onclick="viewTeacher('${u.user_id}')">View</button>
        </td>
      </tr>
    `
  })
}

// Modal functions
window.editTeacher = async(id)=>{
  document.getElementById("editModal").style.display="block"
  const {data,error} = await supabase.from("teachers").select("*").eq("user_id",id).single()
  if(error){alert(error.message); return;}
  document.getElementById("teacherId").value = id
  document.getElementById("name").value = data.name || ""
  document.getElementById("email").value = data.email || ""
  document.getElementById("mobile").value = data.mobile || ""
  document.getElementById("subject").value = data.subject || ""
  document.getElementById("status").value = data.status || "active"
  document.getElementById("photo_url").value = data.photo_url || ""
  document.getElementById("photoPreview").src = data.photo_url || "https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
}

window.saveTeacher = async ()=>{
  const id = document.getElementById("teacherId").value
  await supabase.from("teachers").update({
    name:document.getElementById("name").value,
    email:document.getElementById("email").value,
    mobile:document.getElementById("mobile").value,
    subject:document.getElementById("subject").value,
    status:document.getElementById("status").value,
    photo_url:document.getElementById("photo_url").value
  }).eq("user_id",id)
  closeModal()
  fetchTeachers()
}

window.closeModal = ()=>{document.getElementById("editModal").style.display="none"}

window.exportTeachers = ()=>{
  let csv="Name,Email,Mobile,Subject,Status\n"
  teachersCache.forEach(u=>{
    const t = u.teachers?.[0] || {}
    csv+=`${u.full_name},${u.email},${t.mobile||""},${t.subject||""},${t.status||"active"}\n`
  })
  const blob = new Blob([csv])
  const link = document.createElement("a")
  link.href = URL.createObjectURL(blob)
  link.download = "teachers.csv"
  link.click()
}

window.viewTeacher = (id)=>{
  window.location.href = "teachers.html?id=" + id
}

// Optional search
document.getElementById("searchName").addEventListener("input",()=>{
  const q = document.getElementById("searchName").value.toLowerCase()
  renderTable(teachersCache.filter(u=>u.full_name.toLowerCase().includes(q)))
})
document.getElementById("searchEmail").addEventListener("input",()=>{
  const q = document.getElementById("searchEmail").value.toLowerCase()
  renderTable(teachersCache.filter(u=>u.email.toLowerCase().includes(q)))
})

fetchTeachers()
</script>
</body>
</html>
