<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vision School – Student Master</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Poppins;background:#f4f6fb}
header{
background:linear-gradient(135deg,#1e2a78,#283593);
color:#fff;
padding:18px 25px;
font-size:20px;
font-weight:600;
}
.container{padding:25px}
.top-bar{
display:flex;
justify-content:space-between;
gap:10px;
flex-wrap:wrap;
margin-bottom:15px;
}
.search-bar{
display:flex;
gap:10px;
flex-wrap:wrap;
}
.search-bar input{
padding:10px;
border:1px solid #ccc;
border-radius:6px;
}
button{
padding:8px 14px;
border:none;
border-radius:6px;
cursor:pointer;
}
.edit{
background:#5c6bc0;
color:white;
}
.view{
background:#3498db;
color:white;
}
.export{
background:#16a085;
color:white;
}
.table-wrapper{
background:white;
border-radius:10px;
overflow:auto;
box-shadow:0 10px 25px rgba(0,0,0,.08);
}
table{
width:100%;
border-collapse:collapse;
}
th,td{
padding:12px;
border-bottom:1px solid #eee;
font-size:13px;
}
th{
background:#eef1ff;
}
tr:hover{
background:#f9fbff;
}
.status-ok{
background:#e6f9ed;
color:#0f9d58;
padding:4px 10px;
border-radius:6px;
font-size:12px;
}
.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.45);
}
.modal-box{
background:white;
width:450px;
max-width:95%;
margin:50px auto;
padding:20px;
border-radius:10px;
}
.field{
width:100%;
padding:10px;
margin-bottom:10px;
border:1px solid #ccc;
border-radius:6px;
}
.preview{
width:80px;
height:80px;
border-radius:50%;
object-fit:cover;
margin-bottom:10px;
}
.modal-actions{
display:flex;
justify-content:flex-end;
gap:10px;
}
</style>

</head>

<body>

<header>🏫 Vision School – Student Master</header>

<div class="container">

<div class="top-bar">

<div class="search-bar">
<input id="searchName" placeholder="Search Name" oninput="applyFilters()">
<input id="searchClass" placeholder="Search Class" oninput="applyFilters()">
</div>

<button class="export" onclick="exportStudents()">
Export Students
</button>

</div>

<div class="table-wrapper">

<table>

<thead>
<tr>
<th>Photo</th>
<th>Name</th>
<th>Email</th>
<th>Mobile</th>
<th>Class</th>
<th>Gender</th>
<th>Username</th>
<th>Status</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="studentsBody"></tbody>

</table>

</div>

</div>

<div class="modal" id="editModal">

<div class="modal-box">

<h3>Edit Student</h3>

<input type="hidden" id="studentId">

<img id="photoPreview"
class="preview"
src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">

<input type="file"
id="photoFile"
class="field"
accept="image/*">

<input id="mobile"
class="field"
placeholder="Mobile">

<input id="applied_class"
class="field"
placeholder="Class">

<div class="modal-actions">
<button onclick="closeModal()">Cancel</button>
<button class="edit" onclick="saveStudent()">Save</button>
</div>

</div>

</div>

<script type="module">

import { createClient }
from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
"https://gocoupvzzsgouwdkdmzu.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdvY291cHZ6enNnb3V3ZGtkbXp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAwMDc2MTAsImV4cCI6MjA4NTU4MzYxMH0.XGxBzWLg9etqOo9NVAX5mrli2u-0dwEYGsVgwx4tXaw"
);

const studentsBody =
document.getElementById("studentsBody");

let studentsCache = [];

async function loadStudents(){

const { data,error } = await supabase
.from("profiles")
.select("*")
.eq("role","student")
.order("class")
.order("full_name");

if(error){
alert(error.message);
return;
}

studentsCache = data || [];
renderTable(studentsCache);

}

function renderTable(data){

studentsBody.innerHTML = "";

data.forEach(student=>{

studentsBody.innerHTML += `
<tr>

<td>
<img
src="${student.profile_photo_url || 'https://cdn-icons-png.flaticon.com/512/3135/3135715.png'}"
width="40"
style="border-radius:50%">
</td>

<td>${student.full_name || '-'}</td>

<td>${student.email || '-'}</td>

<td>${student.mobile || '-'}</td>

<td>${student.class || '-'}</td>

<td>${student.gender || '-'}</td>

<td>${student.username || '-'}</td>

<td>
<span class="status-ok">
Active
</span>
</td>

<td>

<button class="edit"
onclick="editStudent('${student.id}')">
Edit
</button>

<button class="view"
onclick="viewStudent('${student.id}')">
View
</button>

</td>

</tr>
`;

});

}

window.editStudent = async(id)=>{

const { data,error } = await supabase
.from("profiles")
.select("*")
.eq("id",id)
.single();

if(error){
alert(error.message);
return;
}

document.getElementById("studentId").value = id;

document.getElementById("mobile").value =
data.mobile || "";

document.getElementById("applied_class").value =
data.class || "";

document.getElementById("photoPreview").src =
data.profile_photo_url ||
"https://cdn-icons-png.flaticon.com/512/3135/3135715.png";

document.getElementById("editModal").style.display =
"block";

}

window.saveStudent = async()=>{

const id =
document.getElementById("studentId").value;

const photoFile =
document.getElementById("photoFile").files[0];

let profile_photo_url =
document.getElementById("photoPreview").src;

if(photoFile){

const fileExt =
photoFile.name.split(".").pop();

const fileName =
`students/${id}.${fileExt}`;

const { error:uploadError } =
await supabase.storage
.from("student-photos")
.upload(fileName,photoFile,{upsert:true});

if(uploadError){
alert(uploadError.message);
return;
}

const { data } =
supabase.storage
.from("student-photos")
.getPublicUrl(fileName);

profile_photo_url =
data.publicUrl;

}

const { error } =
await supabase
.from("profiles")
.update({

mobile:
document.getElementById("mobile").value,

class:
document.getElementById("applied_class").value,

profile_photo_url

})
.eq("id",id);

if(error){

alert(error.message);
return;

}

closeModal();
loadStudents();

}

window.closeModal = ()=>{

document.getElementById("editModal").style.display =
"none";

}

window.viewStudent = (id)=>{

alert("Student ID : " + id);

}

window.exportStudents = ()=>{

let csv =
"Name,Email,Mobile,Class,Gender,Username\n";

studentsCache.forEach(student=>{

csv +=
`${student.full_name || ''},
${student.email || ''},
${student.mobile || ''},
${student.class || ''},
${student.gender || ''},
${student.username || ''}\n`;

});

const blob =
new Blob([csv]);

const link =
document.createElement("a");

link.href =
URL.createObjectURL(blob);

link.download =
"students.csv";

link.click();

}

window.applyFilters = ()=>{

const nameFilter =
document.getElementById("searchName")
.value.toLowerCase();

const classFilter =
document.getElementById("searchClass")
.value.toLowerCase();

const filtered =
studentsCache.filter(student=>{

const matchName =
(student.full_name || "")
.toLowerCase()
.includes(nameFilter);

const matchClass =
!classFilter ||
(student.class || "")
.toLowerCase()
.includes(classFilter);

return matchName && matchClass;

});

renderTable(filtered);

}

loadStudents();

</script>

</body>
</html>
