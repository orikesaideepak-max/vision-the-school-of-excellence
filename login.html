<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VISION THEE SCHOOL OF EXCELLENCE - Login</title>
  <link rel="stylesheet" href="login.css">
</head>
<body>

<!-- Logo Section -->
<div class="logo-section">
  <img src="hii.jpg" alt="School Logo" class="school-logo">
  <h1>VISION THEE SCHOOL OF EXCELLENCE</h1>
  <p>Sri Ram Colony, Jalpally, Hyderabad</p>
</div>

<!-- Login Container -->
<div class="login-container">
  <h2>Login</h2>

  <!-- Email / Username -->
  <input type="email" id="email" placeholder="Enter Gmail" required />

  <!-- Password with show/hide toggle -->
  <div class="password-wrapper">
    <input type="password" id="password" placeholder="Password" required />
    <span id="togglePassword" class="toggle-password">Show</span>
  </div>

  <!-- Remember Me Checkbox -->
  <div class="remember-me">
    <input type="checkbox" id="remember">
    <label for="remember">Remember Me</label>
  </div>

  <!-- Login Button -->
  <button onclick="login()">Login</button>

  <!-- Forgot Password & Sign Up Links -->
  <div class="login-links">
    <a href="forgotpassword.html" class="forgot-btn">Forgot Password?</a>
    <a href="signup.html" class="signup-btn">Sign Up</a>
  </div>

  <!-- Social Login (optional) -->
  <div class="social-login">
    <p>Or login with</p>
    <button class="social-btn google-btn">Google</button>
    <button class="social-btn facebook-btn">Facebook</button>
  </div>

  <!-- Error Message -->
  <p id="error" class="error-msg"></p>
</div>

<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="login.js"></script>

<script>
  // Show/Hide Password
  const togglePassword = document.getElementById('togglePassword');
  const password = document.getElementById('password');

  togglePassword.addEventListener('click', () => {
    const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
    password.setAttribute('type', type);
    togglePassword.textContent = type === 'password' ? 'Show' : 'Hide';
  });
</script>

</body>
</html>
