<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vision School</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="index.css">
</head>

<body>

<!-- WATERMARK -->
<div class="watermark"></div>

<!-- TOP LOGO -->
<div class="top-logo">
  <img src="hii.jpg" alt="logo">
</div>

<!-- HERO -->
<section class="hero">
  <div class="hero-box">

    <h1 id="title">VISION THE SCHOOL OF EXCELLENCE</h1>

    <p id="tagline">Empowering students with knowledge & discipline</p>

    <!-- QUOTE BOX -->
    <div id="quoteBox">
      <p id="quote">
        “Education is the most powerful weapon which you can use to change the world.”
      </p>
    </div>

    <div class="btn-group">
      <button onclick="go('admin')">Admin</button>
      <button onclick="go('teacher')">Teacher</button>
      <button onclick="go('student')">Student</button>
      <button onclick="openGallery()">Gallery</button>
    </div>

  </div>
</section>

<!-- ABOUT -->
<section class="section">
  <h2>About School</h2>
  <p>Modern education with discipline and innovation.</p>
</section>

<!-- SLIDER -->
<div class="slider">
  <div class="track">
    <img src="1.jpg.jpeg">
    <img src="2.jpg.jpeg">
    <img src="3.jpg.jpeg">
    <img src="4.jpg.jpeg">
    <img src="5.jpg.jpeg">
    <img src="6.jpg.jpeg">
    <img src="7.jpg.jpeg">
    <img src="8.jpg.jpeg">
    <img src="9.jpg.jpeg">
    <img src="10.jpg.jpeg">
    <img src="11.jpg.jpeg">
    <img src="12.jpg.jpeg">
  </div>
</div>

<script>
// ================= NAVIGATION =================
function go(role) {
  window.location.href = "login.html?role=" + role;
}

// ================= GALLERY =================
function openGallery() {
  window.open("https://www.instagram.com/vision_edu_society/", "_blank");
}

// ================= QUOTES ROTATION =================
const quotes = [
  "Education is the most powerful weapon which you can use to change the world.",
  "Success is not final, failure is not fatal: it is the courage to continue that counts.",
  "Dream big and dare to fail.",
  "Learning never exhausts the mind.",
  "Discipline is the bridge between goals and achievement.",
  "A child without education is like a bird without wings."
];

let qIndex = 0;

function changeQuote() {
  const quoteEl = document.getElementById("quote");

  if (!quoteEl) return;

  quoteEl.style.opacity = 0;

  setTimeout(() => {
    qIndex = (qIndex + 1) % quotes.length;
    quoteEl.textContent = "“" + quotes[qIndex] + "”";
    quoteEl.style.opacity = 1;
  }, 500);
}

setInterval(changeQuote, 4000);

// ================= SCROLL REVEAL =================
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add("show");
    }
  });
});

document.querySelectorAll(".section").forEach(el => {
  observer.observe(el);
});

// ================= SLIDER =================
window.addEventListener("load", () => {
  const track = document.querySelector(".track");
  if (!track) return;

  let x = 0;

  function move() {
    x += 0.7;

    if (x >= track.scrollWidth / 2) {
      x = 0;
    }

    track.style.transform = `translateX(-${x}px)`;
    requestAnimationFrame(move);
  }

  move();
});

// ================= HERO ANIMATION =================
window.onload = () => {
  const box = document.querySelector(".hero-box");

  if (box) {
    box.style.opacity = 0;
    box.style.transform = "translateY(30px)";
    box.style.transition = "1.5s";

    setTimeout(() => {
      box.style.opacity = 1;
      box.style.transform = "translateY(0)";
    }, 300);
  }
};
</script>

</body>
</html>
