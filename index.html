<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vision School | Login</title>
<link rel="stylesheet" href="index.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
/* Optional: hide scrollbar for smoother look */
.image-strip::-webkit-scrollbar {
  display: none;
}
.image-strip {
  -ms-overflow-style: none;
  scrollbar-width: none;
}
</style>
</head>

<body>

<!-- WATERMARK LOGO -->
<div class="watermark-logo">
  <img src="hii.jpg">
</div>

<!-- FLOATING LOGO -->
<div class="logo">
  <img src="hii.jpg">
</div>

<!-- MAIN CONTENT -->
<div class="role-container">

  <h1>VISION SCHOOL</h1>
  <p>Select your role to continue</p>

  <div class="role-buttons">
    <a href="login.html" class="role-btn">ADMIN</a>
    <a href="login.html" class="role-btn">TEACHER</a>
    <a href="login.html" class="role-btn">STUDENT</a>
  </div>

  <div style="text-align:center;">
    <a href="https://www.instagram.com/vision_edu_society" target="_blank" class="gallery-btn">
      VIEW FULL GALLERY
    </a>
  </div>

</div>

<!-- FULL WIDTH IMAGE STRIP -->
<div class="image-strip">
  <div class="image-track">
    <!-- IMAGES -->
    <img src="1.jpg.jpeg">
    <img src="2.jpg.jpeg">
    <img src="3.jpg.jpeg">
    <img src="4.jpg.jpeg">
    <img src="5.jpg.jpeg">
    <img src="6.jpg.jpeg">
    <img src="7.jpg.jpeg">
    <img src="8.jpg.jpeg">
    <img src="9.jpg.jpeg">
    <img src="10.jpg.jpeg">
    <img src="11.jpg.jpeg">
    <img src="12.jpg.jpeg">

    <!-- DUPLICATE FOR LOOP -->
    <img src="1.jpg.jpeg">
    <img src="2.jpg.jpeg">
    <img src="3.jpg.jpeg">
    <img src="4.jpg.jpeg">
    <img src="5.jpg.jpeg">
    <img src="6.jpg.jpeg">
  </div>
</div>

<div class="footer-text">
  © 2026 Vision School Management System
</div>

<!-- JS -->
<script>
const track = document.querySelector(".image-track");
const strip = document.querySelector(".image-strip");

let scrollAmount = 0;
let speed = 0.5; // auto scroll speed

// AUTO SCROLL LOOP
function autoScroll() {
  scrollAmount += speed;
  if (scrollAmount >= track.scrollWidth / 2) {
    scrollAmount = 0;
  }
  track.style.transform = `translateX(-${scrollAmount}px)`;
  requestAnimationFrame(autoScroll);
}
autoScroll();

// DRAG FUNCTION (Desktop + Mobile)
let isDown = false;
let startX;
let scrollLeft;

strip.addEventListener("mousedown", (e) => {
  isDown = true;
  startX = e.pageX - strip.offsetLeft;
  scrollLeft = scrollAmount;
  strip.style.cursor = "grabbing";
});

strip.addEventListener("mouseup", () => {
  isDown = false;
  strip.style.cursor = "grab";
});

strip.addEventListener("mouseleave", () => {
  isDown = false;
  strip.style.cursor = "grab";
});

strip.addEventListener("mousemove", (e) => {
  if (!isDown) return;
  e.preventDefault();
  const x = e.pageX - strip.offsetLeft;
  const walk = (x - startX) * 1.5;
  scrollAmount = scrollLeft - walk;
});

// Touch events for mobile
strip.addEventListener("touchstart", (e) => {
  isDown = true;
  startX = e.touches[0].pageX - strip.offsetLeft;
  scrollLeft = scrollAmount;
});

strip.addEventListener("touchmove", (e) => {
  if (!isDown) return;
  const x = e.touches[0].pageX - strip.offsetLeft;
  const walk = (x - startX) * 1.5;
  scrollAmount = scrollLeft - walk;
});

strip.addEventListener("touchend", () => {
  isDown = false;
});
</script>

</body>
</html>
