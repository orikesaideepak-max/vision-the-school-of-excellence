<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teacher Dashboard</title>

<link rel="stylesheet" href="td.css">
</head>

<body>

<div class="layout">

<!-- ================= SIDEBAR ================= -->
<aside class="sidebar" id="sidebar">
  <h2>Teacher Panel</h2>

  <!-- FIXED: safe relative links -->
  <a href="./dashboard.html">🏠 Dashboard</a>
  <a href="./students.html">👨‍🎓 Students</a>
  <a href="./attendance.html">📅 Attendance</a>
  <a href="./assignments.html">📝 Assignments</a>
  <a href="./marks.html">📊 Marks</a>
  <a href="./notices.html">📢 Notices</a>
  <a href="./messages.html">💬 Messages</a>
  <a href="./homework.html">📚 Homework</a>
  <a href="./timetable.html">🗓️ Timetable</a>
  <a href="./materials.html">📂 Materials</a>
  <a href="./exams.html">🧾 Exams</a>
  <a href="./results.html">🏆 Results</a>
  <a href="./library.html">📖 Library</a>
  <a href="./fees.html">💰 Fees</a>
  <a href="./events.html">🎉 Events</a>
  <a href="./profile.html">👤 Profile</a>

  <!-- FIXED LOGOUT PATH -->
  <a href="#" onclick="logout()">🚪 Logout</a>
</aside>

<!-- ================= MAIN ================= -->
<main class="main">

  <header class="topbar">

    <button class="menu-btn" onclick="toggleMenu()">☰</button>

    <h2>Teacher Dashboard</h2>

    <div id="teacherName">Welcome</div>
  </header>

  <section class="section">
    <h3>Welcome to Teacher Portal 👋</h3>
    <p>Select a module from the sidebar to continue.</p>
  </section>

</main>

</div>

<!-- ================= JS ================= -->
<script>

/* MOBILE MENU */
function toggleMenu(){
  document.getElementById("sidebar").classList.toggle("active");
}

/* AUTO CLOSE SIDEBAR ON CLICK */
document.querySelectorAll(".sidebar a").forEach(link=>{
  link.addEventListener("click",()=>{
    document.getElementById("sidebar").classList.remove("active");
  });
});

/* LOGOUT FIXED PATH */
function logout(){
  alert("Logging out...");
  window.location.href = "./login.html";
}

</script>

</body>
</html>
